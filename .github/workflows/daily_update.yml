name: Daily AI News Update

on:
  schedule:
    - cron: "0 23 * * *" # 毎日 JST 08:00 (UTC 23:00)
    - cron: "5 23 * * *" # 毎日 JST 08:05 (UTC 23:05) - 予備トリガー
  workflow_dispatch: # 手動実行用

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas yfinance

      - name: Run Update Script with Retry Logic
        id: update
        continue-on-error: true
        run: |
          # リトライロジックの組み込み (15分おきに最大3回)
          MAX_RETRIES=3
          RETRY_COUNT=0
          SUCCESS=false

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Attempting update (Attempt $((RETRY_COUNT + 1)))..."
            python update_dashboard.py && SUCCESS=true && break
            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "Update failed. Retrying in 15 minutes..."
              sleep 900
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo "Update failed after $MAX_RETRIES attempts."
            exit 1
          fi

      - name: Commit and Push changes
        if: steps.update.outcome == 'success'
        run: |
          git config --global user.name "Manus Bot"
          git config --global user.email "bot@manus.im"
          git add index.html
          git commit -m "[Auto-Update JST 08:00 Success] $(date +'%Y-%m-%d %H:%M:%S')"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .

      - name: Verify Deployment
        run: |
          # GitHub PagesのURLを構築
          REPO_NAME=$(echo ${{ github.repository }} | cut -d '/' -f 2)
          DEPLOY_URL="https://${{ github.repository_owner }}.github.io/${REPO_NAME}/"
          echo "Verifying deployment at: $DEPLOY_URL"
          
          # GitHub Pagesの反映を待機（5分間）
          echo "Waiting 5 minutes for GitHub Pages to reflect changes..."
          sleep 300

          # その後、サイトが更新されるまで検証（最大5分間、30秒ごとにリトライ）
          for i in $(seq 1 10);
          do
            echo "Attempt $i: Checking $DEPLOY_URL for latest content..."
            # 最新の日付文字列を生成
            CURRENT_DATE=$(date +"%Y年%m月%d日")
            # 公開URLの内容を取得し、最新の日付が含まれているか確認
            if curl -s "${DEPLOY_URL}?v=$(date +%s)" | grep -q "${CURRENT_DATE}"; then
              echo "Deployment verified successfully!"
              exit 0
            fi
            sleep 30
          done
          echo "Deployment verification failed: Latest date not found on $DEPLOY_URL"
          exit 1
