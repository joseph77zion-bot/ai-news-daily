name: Update AI News Dashboard

on:
  schedule:
    - cron: '0 23 * * *' # 毎日午前8時 (JST) = 23:00 UTC
  workflow_dispatch: # 手動実行を可能にする

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 必要に応じて追加のPythonパッケージをインストール

    - name: Run dashboard update script
      run: python /home/ubuntu/ai-news-daily-repo/update_dashboard.py

    - name: Commit and push if changes exist
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html
        git commit -m "Update AI News Dashboard with latest data" || echo "No changes to commit"
        git push
