name: Update AI News Dashboard
on:
  schedule:
    - cron: '0 23 * * *'  # 毎日午前8時 (JST) = 23:00 UTC
  workflow_dispatch:  # 手動実行を可能にする
jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
    - name: Run dashboard update script
      run: |
        cd ${{ github.workspace }}
        python update_dashboard.py
    - name: Commit and push if changes exist
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html news_data.json
        git diff --quiet && git diff --staged --quiet || git commit -m "Update AI News Dashboard with latest data (3/18)"
        git push
        # Add an empty commit to ensure workflow always triggers GitHub Pages deployment
        git commit --allow-empty -m "Trigger GitHub Pages deployment" && git push
